<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' https://avatars.githubusercontent.com">
    <title>SubCat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100vh;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            padding: 20px;
            -webkit-app-region: drag;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-top: 20px;
        }

        .header-title {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .header-title img {
            width: 34px;
        }

        .header-title h1 {
            font-size: 26px;
            font-weight: 600;
            color: #fff;
        }

        .header-title p {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .header-user {
            display: flex;
            align-items: center;
            gap: 8px;
            -webkit-app-region: no-drag;
        }

        .auth-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: none;
        }

        .auth-username {
            font-size: 12px;
            color: #aaa;
        }

        .app-version {
            margin-top: 3px;
            font-size: 10px;
            color: #444;
            cursor: pointer;
            -webkit-app-region: no-drag;
        }

        .app-version:hover {
            color: #888;
        }

        .refresh-btn {
            background: none;
            border: none;
            color: #444;
            font-size: 24px;
            cursor: pointer;
            padding: 0 2px;
            line-height: 1;
            -webkit-app-region: no-drag;
            transition: color 0.2s, transform 0.3s;
        }

        .refresh-btn:hover {
            color: #888;
        }

        .refresh-btn.spinning {
            animation: spin 0.6s linear;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .input-section {
            -webkit-app-region: no-drag;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #16213e;
            color: #e0e0e0;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 10px;
        }

        input[type="text"]:focus {
            border-color: #0f3460;
        }

        input::placeholder {
            color: #666;
        }

        .auth-section {
            background: #16213e;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 16px;
            -webkit-app-region: no-drag;
        }

        .auth-logged-out { display: flex; flex-direction: column; gap: 10px; }

        .auth-logged-in {
            display: flex;
            align-items: center;
            gap: 10px;
        }


        button.github-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-app-region: no-drag;
            background: #238636;
            color: #fff;
        }

        button.github-btn:hover {
            background: #2ea043;
        }

        button.github-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button.logout-btn {
            padding: 6px 12px;
            border: 1px solid #444;
            border-radius: 6px;
            background: none;
            color: #aaa;
            font-size: 11px;
            cursor: pointer;
            -webkit-app-region: no-drag;
        }

        button.logout-btn:hover {
            color: #fff;
            border-color: #888;
        }

        .device-code-box {
            background: #0d1b36;
            border: 1px dashed #533483;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .device-code {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #fff;
            font-family: 'SF Mono', 'Fira Code', monospace;
            margin: 8px 0;
        }

        .device-code-hint {
            font-size: 11px;
            color: #888;
        }


        button.add-btn {
            width: 100%;
            padding: 10px;
            border: 1px dashed white;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-app-region: no-drag;
            background: none;
            color: white;
        }

        button.add-btn:hover {
            border-color: #888;
            color: #e0e0e0;
        }

        .url-form-actions {
            display: flex;
            gap: 8px;
            margin-top: 0;
            align-items: center;
        }

        .repeat-field {
            display: flex;
            align-items: center;
            gap: 4px;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 0 10px;
            background: #16213e;
        }

        .repeat-label {
            color: #666;
            font-size: 13px;
        }

        .repeat-field input[type="number"] {
            width: 44px;
            background: none;
            border: none;
            color: #e0e0e0;
            font-size: 13px;
            padding: 10px 0;
            margin: 0;
            text-align: center;
            -moz-appearance: textfield;
        }

        .repeat-field input[type="number"]::-webkit-outer-spin-button,
        .repeat-field input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }

        .run-repeat {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }

        .run-repeat .count-pass { color: #2ecc71; }
        .run-repeat .count-fail { color: #e74c3c; }

        .run-results {
            display: inline-flex;
            gap: 6px;
            margin-left: 8px;
            font-size: 11px;
        }

        button.watch-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: linear-gradient(135deg, #0f3460, #533483);
            color: #fff;
        }

        button.watch-btn:hover {
            box-shadow: 0 4px 12px rgba(83, 52, 131, 0.4);
        }

        button.watch-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }

        button.cancel-btn {
            padding: 10px 16px;
            border: 1px solid #444;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            background: none;
            color: #888;
            transition: all 0.2s;
        }

        button.cancel-btn:hover {
            border-color: #888;
            color: #e0e0e0;
        }

        .runs-list {
            margin-top: 20px;
            -webkit-app-region: no-drag;
            overflow-y: auto;
            min-height: 0;
        }

        .runs-list:not(:empty) {
            flex: 1;
        }

        .runs-section {
            margin-bottom: 6px;
        }

        .runs-section-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #444;
            margin-bottom: 6px;
            padding-left: 2px;
        }

        .run-card {
            background: #16213e;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
            position: relative;
            transition: border-color 0.3s;
        }

        .run-card.completed-success { border-color: #2ecc71; }
        .run-card.completed-failure { border-color: #e74c3c; }
        .run-card.in-progress { border-color: #f39c12; }

        .run-card-header {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 6px;
        }

        .run-name {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .run-status {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.in_progress, .status-dot.queued, .status-dot.waiting, .status-dot.pending {
            background: #f39c12;
            animation: pulse 1.5s infinite;
        }

        .status-dot.success { background: #2ecc71; }
        .status-dot.failure, .status-dot.cancelled, .status-dot.timed_out { background: #e74c3c; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .run-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .run-actions button {
            background: none;
            border: 1px solid #444;
            color: #aaa;
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }

        .run-actions button:hover {
            color: #fff;
            border-color: #888;
        }

        .run-actions .rerun-btn {
            border-color: #533483;
            color: #a78bfa;
        }

        .run-actions .rerun-btn:hover {
            background: rgba(83, 52, 131, 0.2);
            border-color: #a78bfa;
            color: #c4b5fd;
        }

        .run-actions .rerun-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .run-actions .cancel-run-btn {
            border-color: #444;
            color: #f39c12;
        }

        .run-actions .cancel-run-btn:hover {
            background: rgba(243, 156, 18, 0.1);
            border-color: #f39c12;
            color: #f5c96a;
        }

        .run-actions .cancel-run-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .run-actions .remove-btn {
            border-color: transparent;
            font-size: 16px;
            line-height: 1;
            padding: 2px 6px;
            color: #555;
        }

        .run-actions .remove-btn:hover {
            color: #e74c3c;
            border-color: transparent;
            background: rgba(231, 76, 60, 0.1);
        }

        .run-actions .report-btn {
            border-color: transparent;
            color: #555;
        }

        .run-actions .report-btn:hover {
            border-color: transparent;
            background: none;
            color: #888;
        }

        .run-actions .rerun-failed-btn {
            border-color: #7f1d1d;
            color: #fca5a5;
        }

        .run-actions .rerun-failed-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: #fca5a5;
            color: #fecaca;
        }

        .run-actions .rerun-failed-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .failed-tests {
            list-style: none;
            margin-top: 8px;
            padding: 6px 10px;
            background: rgba(231, 76, 60, 0.07);
            border-left: 2px solid #e74c3c;
            border-radius: 4px;
        }

        .failed-tests li {
            font-size: 11px;
            color: #f87171;
            font-family: 'SF Mono', 'Fira Code', monospace;
            padding: 2px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 12px;
            color: white;
            opacity: .5;
            font-size: 13px;
        }

        .empty-state img {
            width: 218px;
            opacity: .75;
            pointer-events: none;
            user-select: none;
        }

        .loading-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 10px;
            color: #555;
            font-size: 13px;
        }

        .loading-state.visible {
            display: flex;
            animation: fadeIn 0.25s ease forwards;
        }

        .loading-state.hiding {
            animation: fadeOut 0.25s ease forwards;
        }

        .loading-state img {
            width: 218px;
            opacity: .75;
            pointer-events: none;
            user-select: none;
            animation: bounce 0.6s ease-in-out infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .pr-picker {
            margin-bottom: 10px;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
        }

        .pr-picker-label {
            padding: 7px 12px 5px;
            font-size: 11px;
            color: #555;
            border-bottom: 1px solid #222;
        }

        .pr-picker-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid #222;
        }

        .pr-picker-item:last-child {
            border-bottom: none;
        }

        .pr-picker-item:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .pr-picker-item.selected {
            background: rgba(83, 52, 131, 0.2);
        }

        .pr-picker-name {
            flex: 1;
            font-size: 12px;
            color: #e0e0e0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pr-picker-status {
            font-size: 11px;
            color: #666;
            flex-shrink: 0;
        }

        .my-prs-section {
            flex-shrink: 0;
        }

        .my-prs-header {
            margin-bottom: 6px;
        }

        .my-prs-nav {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .back-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 16px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            -webkit-app-region: no-drag;
        }

        .back-btn:hover { color: #fff; }

        .pr-detail-title {
            font-size: 12px;
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 440px;
        }

        .my-prs-list {
            max-height: 144px;
            overflow-y: auto;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            overflow: hidden;
        }

        .my-prs-list.scrollable {
            overflow-y: auto;
        }

        .my-pr-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 12px;
            cursor: pointer;
            border-bottom: 1px solid #1e1e30;
            transition: background 0.15s;
            -webkit-app-region: no-drag;
        }

        .my-pr-item:last-child { border-bottom: none; }

        .my-pr-item:hover { background: rgba(255,255,255,0.04); }

        .pr-item-info {
            flex: 1;
            min-width: 0;
        }

        .my-pr-meta {
            font-size: 10px;
            color: #555;
            margin-bottom: 2px;
        }

        .my-pr-title {
            font-size: 12px;
            color: #e0e0e0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pr-ci-badge {
            flex-shrink: 0;
        }

        .pr-detail-list {
            overflow-y: auto;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            flex: 1;
        }

        .pr-detail-run {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-bottom: 1px solid #1e1e30;
        }

        .pr-detail-run:last-child { border-bottom: none; }

        .pr-detail-run-name {
            font-size: 12px;
            color: #e0e0e0;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pr-detail-run-status {
            font-size: 11px;
            color: #666;
            flex-shrink: 0;
        }

        .pr-detail-run-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .pr-detail-run-actions button {
            background: none;
            border: 1px solid #444;
            color: #aaa;
            border-radius: 5px;
            padding: 3px 8px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.15s;
            -webkit-app-region: no-drag;
        }

        .pr-detail-run-actions button:hover {
            color: #fff;
            border-color: #888;
        }

        .pr-detail-run-actions .watch-run-btn {
            border-color: #533483;
            color: #a78bfa;
        }

        .pr-detail-run-actions .watch-run-btn:hover {
            background: rgba(83,52,131,0.2);
            border-color: #a78bfa;
            color: #c4b5fd;
        }

        .pr-detail-run-actions .watch-run-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pr-detail-empty, .pr-detail-loading {
            padding: 12px;
            font-size: 12px;
            color: #555;
            text-align: center;
        }

        .section-divider {
            height: 1px;
            background: #1e1e30;
            margin: 12px 0;
        }

        .error-msg {
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid rgba(231, 76, 60, 0.3);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: #e74c3c;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">
            <img src="assets/little-subcat.png" alt="logo">
            <h1>SubCat</h1>
        </div>
        <div class="header-user">
            <span class="app-version" id="appVersion"></span>
            <img class="auth-avatar" id="authAvatar" src="" alt="">
            <span class="auth-username" id="authUsername"></span>
            <button class="refresh-btn" id="refreshBtn" title="Refresh runs">↻</button>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </div>

    <div class="my-prs-section" id="myPrsSection" style="display:none;">
        <div class="my-prs-header">
            <div class="my-prs-nav" id="myPrsNav">
                <span class="section-label">My PRs</span>
            </div>
            <div class="my-prs-nav pr-detail-nav" id="prDetailNav" style="display:none;">
                <button class="back-btn" id="prDetailBack">←</button>
                <span class="pr-detail-title" id="prDetailTitle"></span>
            </div>
            <div class="my-prs-nav pr-detail-nav" id="workflowRunsNav" style="display:none;">
                <button class="back-btn" id="workflowRunsBack">←</button>
                <span class="pr-detail-title" id="workflowRunsTitle"></span>
            </div>
        </div>
        <div class="my-prs-list" id="myPrsList"></div>
        <div class="pr-detail-list" id="prDetailList" style="display:none;"></div>
        <div class="pr-detail-list" id="workflowRunsList" style="display:none;"></div>
        <div class="section-divider"></div>
    </div>

    <div class="runs-list" id="runsList">
        <div class="runs-section" id="sectionMyPrs" style="display:none;">
            <div class="runs-section-label">My PRs</div>
            <div id="sectionMyPrsItems"></div>
        </div>
        <div class="runs-section" id="sectionRuns" style="display:none;">
            <div class="runs-section-label">Runs</div>
            <div id="sectionRunsItems"></div>
        </div>
        <div class="runs-section" id="sectionWorkflows" style="display:none;">
            <div class="runs-section-label">Workflows</div>
            <div id="sectionWorkflowsItems"></div>
        </div>
    </div>
    <div class="empty-state" id="emptyState">
        <img src="assets/noresults.png" alt="">
        <span>Paste a PR or workflow URL to stop babysitting your CI.</span>
    </div>
    <div class="loading-state" id="loadingState">
        <img src="assets/subcat-jump.png" alt="">
        <span>Refreshing…</span>
    </div>

    <div class="input-section">
        <button class="add-btn" id="addBtn">+ Watch</button>

        <div class="url-form" id="urlForm" style="display:none;">
            <input type="text" id="urlInput" placeholder="GitHub Actions run or PR URL" autofocus>
            <div id="prPicker" class="pr-picker" style="display:none;"></div>
            <div class="url-form-actions">
                <div class="repeat-field">
                    <span class="repeat-label">×</span>
                    <input type="number" id="repeatInput" value="1" min="1" max="100">
                </div>
                <button class="watch-btn" id="watchBtn">Watch</button>
                <button class="cancel-btn" id="cancelBtn">Cancel</button>
            </div>
        </div>

        <div id="errorContainer"></div>
    </div>

    <script src="renderer/renderer.js"></script>
</body>
</html>

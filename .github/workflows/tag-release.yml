name: Tag Release

# Runs when a PR merges into main.
# Reads the version from package.json and creates a git tag (e.g. v1.1.0).
# The existing release.yml picks up the tag and handles build + publish.
#
# To cut a release:
#   1. Bump "version" in package.json on dev
#   2. Open PR dev → main
#   3. Merge — this workflow tags automatically and release starts
#
# Note: the tag must be pushed with a PAT (GH_PAT secret) so that GitHub
# treats it as a user action and triggers release.yml. Tags pushed with
# GITHUB_TOKEN are silently ignored by subsequent workflow triggers.

on:
  push:
    branches: [main]

jobs:
  tag:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Read version from package.json
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: tag_exists
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.value }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.tag_exists.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.value }}"
          git push origin "v${{ steps.version.outputs.value }}"

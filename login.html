<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' https://avatars.githubusercontent.com">
    <title>SubCat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 24px 24px;
            -webkit-app-region: drag;
        }

        .logo {
            width: 200px;
            height: 200px;
            margin-bottom: 10px;
        }

        .logo-name {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
        }

        .tagline {
            font-size: 12px;
            color: #666;
            margin-bottom: 32px;
        }

        .login-area {
            width: 100%;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-app-region: no-drag;
        }

        button.github-btn {
            width: 100%;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #238636;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button.github-btn svg { flex-shrink: 0; }
        button.github-btn:hover { background: #2ea043; }
        button.github-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .device-code-box {
            background: #0d1b36;
            border: 1px dashed #533483;
            border-radius: 8px;
            padding: 14px;
            text-align: center;
            display: none;
        }

        .device-code {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #fff;
            font-family: 'SF Mono', 'Fira Code', monospace;
            margin: 8px 0;
        }

        .device-code-hint {
            font-size: 11px;
            color: #888;
        }

        .device-code-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 8px 0;
        }

        .device-code-row .device-code {
            margin: 0;
        }

        .copy-btn {
            background: none;
            border: 1px solid #444;
            border-radius: 6px;
            color: #888;
            cursor: pointer;
            padding: 4px 6px;
            display: flex;
            align-items: center;
            transition: all 0.2s;
        }

        .copy-btn:hover { color: #fff; border-color: #888; }

        .error-msg {
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid rgba(231, 76, 60, 0.3);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <img class="logo" src="assets/subcat.png" alt="SubCat">
    <div class="logo-name">SubCat</div>
    <div class="tagline">Get notified when your GitHub Actions runs finish</div>

    <div class="login-area">
        <button class="github-btn" id="loginBtn">
            <svg width="20" height="20" viewBox="0 0 98 96" fill="white" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z"/></svg>
            <span id="loginBtnText">Login with GitHub</span>
        </button>

        <div class="device-code-box" id="deviceCodeBox">
            <div class="device-code-hint">Enter this code on GitHub:</div>
            <div class="device-code-row">
                <div class="device-code" id="deviceCode"></div>
                <button class="copy-btn" id="copyBtn" title="Copy">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                </button>
            </div>
            <div class="device-code-hint">Waiting for authorization...</div>
        </div>

        <div id="errorContainer"></div>
    </div>

    <script src="login-renderer.js"></script>
</body>
</html>
